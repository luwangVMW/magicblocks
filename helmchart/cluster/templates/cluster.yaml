apiVersion: {{ .Values.apiVersion }}
kind: Cluster
metadata:
  name: {{ .Values.name }}
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 100.96.0.0/11
    serviceDomain: cluster.local
    services:
      cidrBlocks:
        - 100.64.0.0/13
  topology:
    {{- if eq .Values.apiVersion "cluster.x-k8s.io/v1beta1" }}
    class: {{ .Values.clusterClass }}
    {{- else if eq .Values.apiVersion "cluster.x-k8s.io/v1beta2" }}
    classRef:
      name: {{ .Values.clusterClass }}
    {{- else }}
    class: {{ .Values.clusterClass }}
    {{- end }}
    controlPlane:
      metadata:
        annotations:
          run.tanzu.vmware.com/resolve-os-image: os-name=ubuntu, os-version=22.04
      replicas: {{ .Values.kcpCount }}
    variables:
      - name: vmClass
        value: {{ .Values.vmClass }}
      - name: storageClass
        value: {{ .Values.storageClass }}
      - name: kubernetes
        value:
          certificateRotation:
            enabled: true
            renewalDaysBeforeExpiry: 90
    version: {{ .Values.krVersion }}
    workers:
      machineDeployments:
        - class: node-pool
          metadata:
            annotations:
              run.tanzu.vmware.com/resolve-os-image: os-name=ubuntu, os-version=22.04
          name: node-pool-1
          replicas: {{ .Values.workerCount }}
