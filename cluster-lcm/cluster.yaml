apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: vks-demo1
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        - 100.90.0.0/11
    services:
      cidrBlocks:
        - 100.60.0.0/13
    serviceDomain: cluster.local
  topology:
    classRef:
      name: builtin-generic-v3.6.0
      namespace: vmware-system-vks-public
    version: v1.34.2---vmware.2-vkr.2
    variables:
      - name: vmClass
        value: best-effort-medium
      - name: storageClass
        value: wcpglobal-storage-profile
    controlPlane:
      replicas: 1
      metadata:
        annotations:
          run.tanzu.vmware.com/resolve-os-image: os-name=ubuntu, os-version=22.04
    workers:
      machineDeployments:
        - class: node-pool
          name: kubernetes-cluster-wxff-np-vbs2
          replicas: 1
          metadata:
            annotations:
              run.tanzu.vmware.com/resolve-os-image: os-name=ubuntu, os-version=22.04

